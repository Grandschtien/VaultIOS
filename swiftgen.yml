input_dir: .
output_dir: .

strings:
  inputs:
    - Vault/Common/en.lproj
  outputs:
    - templateName: structured-swift5
      output: Vault/Common/Generated/Strings.generated.swift

xcassets:
  inputs:
    - Vault/Assets.xcassets
  outputs:
    - templateName: swift5
      params:
        forceProvidesNamespaces: true
      output: Vault/Common/Generated/Assets.generated.swift
