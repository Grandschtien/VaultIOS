name: Codex task
description: Structured task for Codex execution
title: "[Codex] "
labels: ["codex-task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What needs to be done
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and what is out of scope
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Clear expected result
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Architecture, performance, line limits, forbidden refactors
      value: |
        - PR must stay under 500 changed lines total
        - Codex must create a plan before implementation
        - No unrelated refactoring
    validations:
      required: true
