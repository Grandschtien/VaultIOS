name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: |
          xcodebuild \
            -scheme YourScheme \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            build

      - name: Test
        run: |
          xcodebuild \
            -scheme YourScheme \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            test
