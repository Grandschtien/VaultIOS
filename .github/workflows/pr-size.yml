name: PR Size

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pr-size-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-size:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Check PR size
        run: ./scripts/check-pr-size.sh origin/${{ github.base_ref }} HEAD
